<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Balatro Difficulty Checker</title>
<meta name="description" content="Is your seed beatable?">
<meta property="og:title" content="Balatro Difficulty Checker">
<meta property="og:description" content="Is your seed beatable?">
<meta property="og:image" content="https://busdash.fyi/difficulty/opengraph.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Balatro Difficulty Checker">
<meta name="twitter:description" content="Is your seed beatable?">
<meta name="twitter:image:type" content="image/png">
<meta name="twitter:image:width" content="1200">
<meta name="twitter:image:height" content="630">
<meta name="twitter:image" content="https://busdash.fyi/difficulty/opengraph.png">
<link rel="icon" href="/favicon.svg" />
<link
  rel="preload"
  href="/balatro.ttf"
  as="font"
  crossorigin=""
  type="font/ttf"
/>
<link rel="prefetch" href="balatrocards.png" fetchpriority="high" />
<style>
@font-face {
  font-family: 'Balatro';
  src: url('/balatro.ttf')
    format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

body {
  background-color: black;
  color: white;
  font-family: Helvetica, Arial, sans-serif;
}

h1 {
  font-family: Balatro, Helvetica, Arial, sans-serif;
}

#progressContainer, #resultContainer {
  display: none;
}

#progressContainer.open, #resultContainer.open {
  display: grid;
  grid-row-gap: 10px;
  grid-template-columns: 1fr;
  margin: 10px 0;
}

#progressBar, img {
  width: calc(min(95vw, 600px));
}

a {
  color: white;
  font-weight: bold;
  text-decoration: none;
}
</style>
</head>
<body>
<h1>Balatro Difficulty Checker</h1>
<p>Is this seed beatable?</p>
<input type="text" class="custom-textbox" placeholder="Ex. ARGLZBRA">
<button type="button" id="check">Check</button>
<div id="progressContainer">
  <img src="waitingbear.gif" />
  <progress
  id="progressBar"
  title="Checking..."
  max="100"
  value="1"></progress>
</div>
<div id="resultContainer">
  &#9989; Yes, it's beatable.
  <a href="https://discord.com/invite/balatro" target="_blank">Help</a>
</div>
<script>
document.getElementById("check").addEventListener('click', check);

function check() {
  const progressContainer = document.getElementById("progressContainer");
  progressContainer.classList.add("open");
  const progressBar = document.getElementById("progressBar");
  progressBar.value = 0;
  const resultContainer = document.getElementById("resultContainer");
  resultContainer.classList.remove("open");
  
  const intervalId = setInterval(() => { 
    progressBar.value = progressBar.value + Math.floor(Math.random() * 10) + 1;
    console.log(progressBar.value);
    if (progressBar.value >= 100) {
      clearInterval(intervalId);
      result();
    }
  }, 200);
}

function result() {
  const progressContainer = document.getElementById("progressContainer");
  progressContainer.classList.remove("open");
  const resultContainer = document.getElementById("resultContainer");
  resultContainer.classList.add("open");
}
</script>
</body>
</html>

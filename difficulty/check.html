<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Balatro Difficulty Checker</title>
<meta name="description" content="Is your seed beatable?">
<meta property="og:title" content="Balatro Difficulty Checker">
<meta property="og:description" content="Is your seed beatable?">

<meta property="og:image:height" content="630">

<meta name="twitter:description" content="Is your seed beatable?">

  rel="preload"
  href="/balatro.ttf"
  as="font"
  crossorigin=""
  type="font/ttf"
/>
<link rel="prefetch" href="balatrocards.png" fetchpriority="high" />
<style>
@font-face {
  font-family: 'Balatro';
  src: url('/balatro.ttf')
    format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

body {
  background-color: black;
  color: white;
  font-family: Helvetica, Arial, sans-serif;
  padding: 5px;
}

@media (min-width: 480px) {
  body {
    padding: 10px;
  }
}

h1, h2, h3, h4, h5, h6 {
  font-family: Balatro, Helvetica, Arial, sans-serif;
}

h1, h2, h3, h4, h5, h6 {
  margin: 0;
}

#resultContainer p {
  margin: 0;
}

#progressContainer, #resultContainer {
  display: none;
}

#progressContainer.open, #resultContainer.open {
  display: grid;
  grid-row-gap: 10px;
  margin: 10px 0;
}

#progressContainer.open {
  grid-template-columns: 1fr;
}

#resultContainer.open {
  grid-template-columns: auto 1fr;
}

#progressBar, img {
  width: calc(min(95vw, 600px));
}

a {
  color: white;
  font-weight: bold;
  text-decoration: none;
}

iframe {
  width: calc(min(95vw, 960px));
  height: calc(min(50vh, 600px));
}

img.screen, #progressContainer button, #fastModeContainer button, #resultContainer button {
  width: calc(min(95vw, 600px));
}

img.joke {
  width: calc(min(95vw, 200px));
  aspect-ratio: calc(1/1.338);
}

.hidden {
  display: none;
}

.discordButton {
  background-color: white;
  color: black;
  border-radius: 3px;
  padding: 2px 5px;
}

.discordLogo {
  height: 16px;
  width: 16px;
  transform: translateY(3px);
}

p {
  display: flex;
  align-items: center;
}

.timesChecked {
  margin-top: 30px;
}
</style>
</head>
<body>
<h1>Balatro Difficulty Checker</h1>
<p>Is this seed beatable?</p>
<input type="text" class="custom-textbox" placeholder="Ex. ARGLZBRA">
<button type="button" id="check">Check</button>
<div id="progressContainer">
  <img src="waitingbear.gif" />
  <progress
  id="progressBar"
  title="Checking..."
  max="100"
  value="1"></progress>
  <button id="fastMode" class="hidden">Fast Mode</button>
</div>
<div id="fastModeContainer" class="hidden">
  <img src="MWXHHMKUNSTY.jpeg" class="screen" />
  <p>The bear will be sad. :( Are you sure you want to turn on fast mode?</p>
  <button id="iHateBears" class="hidden">I Hate Bears</button>
  <button id="saveBear">Save The Bears</button>
  <button id="askLater">Ask Me Again Later</button>
</div>
<div id="resultContainer">
  <p style="grid-column: span 2">&#9989; Yes, it's beatable.</p>
  <a href="https://discord.com/invite/balatro" target="_blank"><div class="discordButton"><?xml version="1.0" encoding="UTF-8"?><svg class="discordLogo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 126.644 96"><defs><style>.cls-1{fill:#000000;}</style></defs><path id="Discord-Symbol-White" class="cls-1" d="M81.15,0c-1.2376,2.1973-2.3489,4.4704-3.3591,6.794-9.5975-1.4396-19.3718-1.4396-28.9945,0-.985-2.3236-2.1216-4.5967-3.3591-6.794-9.0166,1.5407-17.8059,4.2431-26.1405,8.0568C2.779,32.5304-1.6914,56.3725.5312,79.8863c9.6732,7.1476,20.5083,12.603,32.0505,16.0884,2.6014-3.4854,4.8998-7.1981,6.8698-11.0623-3.738-1.3891-7.3497-3.1318-10.8098-5.1523.9092-.6567,1.7932-1.3386,2.6519-1.9953,20.281,9.547,43.7696,9.547,64.0758,0,.8587.7072,1.7427,1.3891,2.6519,1.9953-3.4601,2.0457-7.0718,3.7632-10.835,5.1776,1.97,3.8642,4.2683,7.5769,6.8698,11.0623,11.5419-3.4854,22.3769-8.9156,32.0509-16.0631,2.626-27.2771-4.496-50.9172-18.817-71.8548C98.9811,4.2684,90.1918,1.5659,81.1752.0505l-.0252-.0505ZM42.2802,65.4144c-6.2383,0-11.4159-5.6575-11.4159-12.6535s4.9755-12.6788,11.3907-12.6788,11.5169,5.708,11.4159,12.6788c-.101,6.9708-5.026,12.6535-11.3907,12.6535ZM84.3576,65.4144c-6.2637,0-11.3907-5.6575-11.3907-12.6535s4.9755-12.6788,11.3907-12.6788,11.4917,5.708,11.3906,12.6788c-.101,6.9708-5.026,12.6535-11.3906,12.6535Z"/></svg> Get Help On Discord</div></a>
</div>
<div>
<p class="timesChecked"><i>Times checked: <span id="checkedTimeContainer">0</span></i></p>
<p><button id="saveBear2" class="hidden">Save The Bears</button></p>
</div>
<script>
let triggeredFastModeModal = false;

init();
function init() {
  // Write counter to page
  const rawCheckedTimes = JSON.parse(localStorage.getItem("checkedTimes"));
  let checkedTimes = rawCheckedTimes === null ? 0 : rawCheckedTimes;
  document.getElementById("checkedTimeContainer").innerText = checkedTimes;

  // Check if we need to show save bear button
  if (localStorage.getItem("fastMode") !== null)  {
    document.getElementById("saveBear2").classList.remove("hidden");
  }
}

document.getElementById("check").addEventListener('click', check);
function check() {
  // Counter
  const rawCheckedTimes = JSON.parse(localStorage.getItem("checkedTimes"));
  let checkedTimes = rawCheckedTimes === null ? 0 : rawCheckedTimes;
  checkedTimes = checkedTimes + 1;
  localStorage.setItem("checkedTimes", checkedTimes);
  document.getElementById("checkedTimeContainer").innerText = checkedTimes;

  // Reset fast mode modal if needed
  triggeredFastModeModal = false;
  if (!document.getElementById("fastModeContainer").classList.contains("hidden")) {
    document.getElementById("fastModeContainer").classList.add("hidden");
  }

  // Skip mode active, just show the result
  if (localStorage.getItem("fastMode") !== null) {
    result();
    return;
  }

  // See if we should show the fast mode button
  const fastModeCounter = JSON.parse(localStorage.getItem("fastModeCounter"));
  if (fastModeCounter === null) {
    localStorage.setItem("fastModeCounter", 1);
  } else if (fastModeCounter < 5) {
    localStorage.setItem("fastModeCounter", fastModeCounter + 1);
  } else {
    document.getElementById("fastMode").classList.remove("hidden");
  }

  // Show progress container
  const progressContainer = document.getElementById("progressContainer");
  progressContainer.classList.add("open");

  // Update progress bar
  const progressBar = document.getElementById("progressBar");
  progressBar.value = 0;
  const resultContainer = document.getElementById("resultContainer");
  resultContainer.classList.remove("open");
  
  const intervalId = setInterval(() => {
    progressBar.value = progressBar.value + Math.floor(Math.random() * 10) + 1;
    /* progressBar.value = 100; */
    /* console.log(progressBar.value); */
    if (progressBar.value >= 100) {
      clearInterval(intervalId);
      result();
    }
  }, 200);
}

function result() {
  const progressContainer = document.getElementById("progressContainer");
  progressContainer.classList.remove("open");
  const resultContainer = document.getElementById("resultContainer");
  if (!triggeredFastModeModal) {
    resultContainer.classList.add("open");
  }
}

document.getElementById("fastMode").addEventListener('click', fastMode);

function fastMode() {
  triggeredFastModeModal = true;
  document.getElementById("progressContainer").classList.remove("open");
  document.getElementById("fastModeContainer").classList.remove("hidden");
}

document.getElementById("saveBear").addEventListener('click', saveBear);
function saveBear() {
  localStorage.removeItem("fastModeCounter");
  document.getElementById("fastMode").classList.add("hidden");
  document.getElementById("fastModeContainer").classList.add("hidden");
}

document.getElementById("saveBear2").addEventListener('click', saveBear2);
function saveBear2() {
  document.getElementById("saveBear2").classList.add("hidden");
  localStorage.removeItem("fastMode");
  localStorage.removeItem("fastModeCounter");
}

document.getElementById("askLater").addEventListener('click', askLater);
function askLater() {
  document.getElementById("fastModeContainer").classList.add("hidden");
  document.getElementById("askLater").classList.add("hidden");
  document.getElementById("iHateBears").classList.remove("hidden");
}

document.getElementById("iHateBears").addEventListener('click', iHateBears);
function iHateBears() {
  document.getElementById("fastModeContainer").classList.add("hidden");
  localStorage.setItem("fastMode", "true");
  document.getElementById("saveBear2").classList.remove("hidden");
}
</script>
</body>
</html>
